name: Python quality

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "20 18 * * *"

permissions:
  contents: read

concurrency:
  group: python-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: make quality PYTHON=python
      - run: make package PYTHON=python

  fast-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: ./scripts/test.sh fast
        env:
          PYTHON_BIN: python
          PYTEST_XDIST_WORKERS: "0"

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: ./scripts/test.sh integration
        env:
          PYTHON_BIN: python
          PYTEST_XDIST_WORKERS: "0"

  fast-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: make coverage-fast PYTHON=python

  nightly-slow-tests:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: ./scripts/test.sh slow
        env:
          PYTHON_BIN: python
          PYTEST_XDIST_WORKERS: "0"
      - run: ./scripts/test.sh slow-integration
        env:
          PYTHON_BIN: python
          PYTEST_XDIST_WORKERS: "0"
