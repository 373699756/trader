name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      ci_fail_on_timeout:
        description: "Fail CI if any suite exceeds its timing threshold"
        required: false
        default: "false"
      ci_use_xdist:
        description: "Install and use pytest-xdist in CI"
        required: false
        default: "true"
      ci_xdist_workers:
        description: "pytest-xdist workers (0 disables, auto uses default)"
        required: false
        default: "auto"
      fast_max_seconds:
        description: "Warning/fail threshold for fast suite (seconds)"
        required: false
        default: "1200"
      integration_max_seconds:
        description: "Warning/fail threshold for integration suite (seconds)"
        required: false
        default: "600"
      slow_max_seconds:
        description: "Warning/fail threshold for slow suite (seconds)"
        required: false
        default: "2400"
      slow_integration_max_seconds:
        description: "Warning/fail threshold for slow+integration suite (seconds)"
        required: false
        default: "2400"
  schedule:
    - cron: "0 1 * * *"

env:
  FAST_MAX_SECONDS: ${{ github.event.inputs.fast_max_seconds || vars.FAST_MAX_SECONDS || '1200' }}
  INTEGRATION_MAX_SECONDS: ${{ github.event.inputs.integration_max_seconds || vars.INTEGRATION_MAX_SECONDS || '600' }}
  SLOW_MAX_SECONDS: ${{ github.event.inputs.slow_max_seconds || vars.SLOW_MAX_SECONDS || '2400' }}
  SLOW_INTEGRATION_MAX_SECONDS: ${{ github.event.inputs.slow_integration_max_seconds || vars.SLOW_INTEGRATION_MAX_SECONDS || '2400' }}
  FAIL_ON_TIMEOUT: ${{ github.event.inputs.ci_fail_on_timeout || vars.CI_FAIL_ON_TIMEOUT || 'false' }}
  CI_USE_XDIST: ${{ github.event.inputs.ci_use_xdist || vars.CI_USE_XDIST || 'true' }}
  PYTEST_XDIST_WORKERS: ${{ github.event.inputs.ci_xdist_workers || vars.PYTEST_XDIST_WORKERS || 'auto' }}

jobs:
  fast:
    name: Fast tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${CI_USE_XDIST,,}" = "true" ]; then
            pip install pytest-xdist
          fi
      - name: Init timing capture
        id: timing
        run: |
          timing_file="${RUNNER_TEMP}/test-timings-fast.csv"
          echo "suite,elapsed_seconds,threshold_seconds,status,run_id,run_number,run_attempt,timestamp" > "$timing_file"
          echo "timing_file=${timing_file}" >> "$GITHUB_OUTPUT"
      - name: Run fast test suite
        id: fast
        run: |
          set -euo pipefail
          timing_file="${{ steps.timing.outputs.timing_file }}"
          start_ts=$(date +%s)
          status="pass"
          set +e
          ./scripts/test.sh fast-parallel
          suite_exit_code=$?
          set -e
          elapsed_seconds=$(( $(date +%s) - start_ts ))
          threshold_seconds="${FAST_MAX_SECONDS:-1200}"
          fail_on_timeout="${FAIL_ON_TIMEOUT:-false}"
          if [ "${suite_exit_code}" -ne 0 ]; then
            status="fail"
            echo "::error title=Test suite failed::fast tests failed"
          elif [ "${elapsed_seconds}" -gt "${threshold_seconds}" ]; then
            status="warn"
            echo "::warning title=Slow test suite::fast tests took ${elapsed_seconds}s, exceed ${threshold_seconds}s threshold"
            if [ "${fail_on_timeout,,}" = "true" ]; then
              status="fail"
              echo "::error title=Timeout policy exceeded::Fast suite exceeded timeout threshold"
            fi
          fi
          echo "fast,${elapsed_seconds},${threshold_seconds},${status},${GITHUB_RUN_ID},${GITHUB_RUN_NUMBER},${GITHUB_RUN_ATTEMPT},$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$timing_file"
          echo "elapsed_seconds=${elapsed_seconds}" >> "$GITHUB_OUTPUT"
          if [ "${status}" = "fail" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### Fast suite duration"
            echo "- elapsed_seconds: ${elapsed_seconds}s"
            echo "- threshold_seconds: ${threshold_seconds}s"
            echo "- status: ${status}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${status}" = "fail" ]; then
            exit 1
          fi
      - name: Publish timing summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Fast suite timing row
          $(cat "${{ steps.timing.outputs.timing_file }}")
          EOF
      - name: Upload timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timings-fast-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ steps.timing.outputs.timing_file }}

  full:
    name: ${{ matrix.suite }} tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: fast
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: integration
            command: integration
            threshold_var: INTEGRATION_MAX_SECONDS
            default_threshold: "600"
            description: Integration tests
          - suite: slow
            command: slow
            threshold_var: SLOW_MAX_SECONDS
            default_threshold: "2400"
            description: Slow tests
          - suite: slow_integration
            command: slow-integration
            threshold_var: SLOW_INTEGRATION_MAX_SECONDS
            default_threshold: "2400"
            description: Slow integration tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${CI_USE_XDIST,,}" = "true" ]; then
            pip install pytest-xdist
          fi
      - name: Init timing capture
        id: timing
        run: |
          timing_file="${RUNNER_TEMP}/test-timings-${{ matrix.suite }}.csv"
          echo "suite,elapsed_seconds,threshold_seconds,status,run_id,run_number,run_attempt,timestamp" > "$timing_file"
          echo "timing_file=${timing_file}" >> "$GITHUB_OUTPUT"
      - name: Run ${{ matrix.description }}
        id: suite
        run: |
          set -euo pipefail
          timing_file="${{ steps.timing.outputs.timing_file }}"
          start_ts=$(date +%s)
          threshold_seconds="${!THRESHOLD_VAR:-${DEFAULT_THRESHOLD}}"
          fail_on_timeout="${FAIL_ON_TIMEOUT:-false}"
          status="pass"
          set +e
          ./scripts/test.sh "${TEST_CMD}"
          suite_exit_code=$?
          set -e
          elapsed_seconds=$(( $(date +%s) - start_ts ))
          if [ "${suite_exit_code}" -ne 0 ]; then
            status="fail"
            echo "::error title=Test suite failed::${{ matrix.description }} failed"
          elif [ "${elapsed_seconds}" -gt "${threshold_seconds}" ]; then
            status="warn"
            echo "::warning title=Slow test suite::${{ matrix.description }} took ${elapsed_seconds}s, exceed ${threshold_seconds}s threshold"
            if [ "${fail_on_timeout,,}" = "true" ]; then
              status="fail"
              echo "::error title=Timeout policy exceeded::${{ matrix.description }} exceeded timeout threshold"
            fi
          fi
          echo "${{ matrix.suite }},${elapsed_seconds},${threshold_seconds},${status},${GITHUB_RUN_ID},${GITHUB_RUN_NUMBER},${GITHUB_RUN_ATTEMPT},$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$timing_file"
          echo "elapsed_seconds=${elapsed_seconds}" >> "$GITHUB_OUTPUT"
          if [ "${status}" = "fail" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### ${{ matrix.description }} duration"
            echo "- elapsed_seconds: ${elapsed_seconds}s"
            echo "- threshold_seconds: ${threshold_seconds}s"
            echo "- status: ${status}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${status}" = "fail" ]; then
            exit 1
          fi
        env:
          TEST_CMD: ${{ matrix.command }}
          THRESHOLD_VAR: ${{ matrix.threshold_var }}
          DEFAULT_THRESHOLD: ${{ matrix.default_threshold }}
      - name: Publish suite summary
        if: always()
        run: |
          cat "${{ steps.timing.outputs.timing_file }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timings-${{ matrix.suite }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ steps.timing.outputs.timing_file }}

  full-timing-summary:
    name: Full suite timing summary
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: full
    steps:
      - name: Download full timing artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-timings-*-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-timings
          merge-multiple: true
      - name: Merge timing reports
        id: merge
        run: |
          set -euo pipefail
          merged_file="${RUNNER_TEMP}/test-timings-full.csv"
          echo "suite,elapsed_seconds,threshold_seconds,status,run_id,run_number,run_attempt,timestamp" > "$merged_file"
          first_file=1
          while IFS= read -r timing_file; do
            [ -f "$timing_file" ] || continue
            if [ "${first_file}" -eq 1 ]; then
              cat "$timing_file" >> "$merged_file"
              first_file=0
            else
              tail -n +2 "$timing_file" >> "$merged_file"
            fi
          done < <(
            find "${RUNNER_TEMP}/ci-timings" -type f \
              \( -name "test-timings-integration-*.csv" \
              -o -name "test-timings-slow-*.csv" \
              -o -name "test-timings-slow_integration-*.csv" \) \
            | sort
          )
          if [ "${first_file}" -eq 1 ]; then
            echo "No timing file downloaded" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "merged_file=${merged_file}" >> "$GITHUB_OUTPUT"
          {
            echo "## Full suite timing summary"
            cat "$merged_file"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload full timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timings-full-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ steps.merge.outputs.merged_file }}
