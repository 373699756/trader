[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --strict-markers
filterwarnings =
    ignore:Due to '_pack_'.*:DeprecationWarning:py_mini_racer\.py_mini_racer
markers =
    slow: long-running scoring or runtime tests
    integration: tests that exercise Flask endpoints, snapshots, persistence, or runtime workflows
